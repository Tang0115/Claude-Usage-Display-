<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clawd Dash</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Noto+Emoji&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    cursor: none !important;
    background: #111827;
    color: white;
    font-family: 'JetBrains Mono', monospace;
    width: 1024px;
    height: 600px;
    overflow: hidden;
    display: grid;
    grid-template-columns: 240px 1fr;
  }

  /* LEFT */
  .left {
    background: #0d1117;
    border-right: 1px solid #1f2937;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 14px 18px;
    overflow: hidden;
  }

  /* Weather widget */
  .weather-widget {
    width: 100%;
    background: #1a2235;
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .weather-icon { font-size: 2em; line-height: 1.3; font-family: 'Noto Emoji', sans-serif; }
  .weather-temp {
    font-size: 1.65em;
    font-weight: 800;
    color: #D97757;
    letter-spacing: 2px;
  }
  .weather-lowhigh {
    font-size: 0.72em;
    font-weight: 700;
    color: #9ca3af;
    letter-spacing: 1.5px;
    text-align: center;
  }
  .weather-desc {
    font-size: 0.63em;
    color: #f9fafb;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
  }
  .weather-loc {
    font-size: 0.56em;
    color: #f9fafb;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* Center group */
  .left-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  /* Pi stats */
  .pi-stats {
    width: 100%;
    display: flex;
    justify-content: space-around;
    background: #1a2235;
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 9px 6px;
  }
  .pi-stat {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .pi-stat-val {
    font-size: 0.85em;
    font-weight: 700;
    color: #D97757;
    letter-spacing: 1px;
  }
  .pi-stat-lbl {
    font-size: 0.56em;
    color: #f9fafb;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .logo-img {
    width: 140px;
    height: 140px;
    object-fit: contain;
    filter: drop-shadow(0 0 20px rgba(217,119,87,0.6));
    animation: bounce 2s ease-in-out infinite;
    transition: filter 1s ease;
  }

  .logo-img.alert {
    animation: bounce 2s ease-in-out infinite, heartbeat-glow 2s ease-in-out infinite;
  }

  @keyframes heartbeat-glow {
    0%, 100% { filter: drop-shadow(0 0 14px rgba(255,60,60,1)) drop-shadow(0 0 32px rgba(255,60,60,0.7)); }
    50%       { filter: drop-shadow(0 0 5px rgba(255,60,60,0.4)) drop-shadow(0 0 12px rgba(255,60,60,0.2)); }
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-14px); }
  }

  #reset-soon {
    font-size: 0.7em;
    letter-spacing: 3px;
    color: #6ee7b7;
    text-transform: uppercase;
    text-align: center;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .mascot-label {
    font-size: 1em;
    letter-spacing: 5px;
    color: #D97757;
    text-transform: uppercase;
    font-weight: 700;
  }

  .live {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.85em;
    letter-spacing: 3px;
    color: #6b7280;
  }

  .live-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #D97757;
    box-shadow: 0 0 8px #D97757;
    animation: liveblink 1.5s ease-in-out infinite;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .live.error .live-dot {
    background: #f06060;
    box-shadow: 0 0 8px #f06060;
  }

  .live.syncing .live-dot {
    background: #6b7280;
    box-shadow: 0 0 8px #6b7280;
  }

  @keyframes liveblink {
    0%,100% { opacity:1; } 50% { opacity:0.2; }
  }

  /* RIGHT */
  .right {
    display: flex;
    flex-direction: column;
    padding: 24px 32px;
    gap: 16px;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1f2937;
    padding-bottom: 14px;
  }

  .top-title {
    font-size: 1.3em;
    font-weight: 800;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #f9fafb;
  }

  .top-time {
    font-size: 1.1em;
    color: #f9fafb;
    letter-spacing: 2px;
    font-weight: 700;
  }

  /* Cards */
  .card {
    flex: 1;
    background: #1a2235;
    border: 1px solid #1f2937;
    border-radius: 18px;
    padding: 18px 26px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .card-label {
    font-size: 0.85em;
    letter-spacing: 3px;
    color: #9ca3af;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .card-pct {
    font-size: 4.8em;
    font-weight: 800;
    line-height: 1;
    color: #D97757;
    transition: color 0.5s;
  }

  .card-pct.warn   { color: #f0c070; }
  .card-pct.danger { color: #f06060; }

  .countdown-box { text-align: right; }

  .countdown {
    font-size: 2em;
    font-weight: 700;
    color: #f9fafb;
    letter-spacing: 2px;
  }

  .countdown-label {
    font-size: 0.75em;
    letter-spacing: 3px;
    color: #6b7280;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .bar-track {
    height: 14px;
    background: #111827;
    border-radius: 7px;
    overflow: hidden;
    border: 1px solid #1f2937;
  }

  .bar-fill {
    height: 100%;
    border-radius: 7px;
    background: #D97757;
    width: 0%;
    transition: width 1.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 10px rgba(217,119,87,0.5);
  }

  .bar-fill.warn   { background: #f0c070; box-shadow: 0 0 10px rgba(240,192,112,0.5); }
  .bar-fill.danger { background: #f06060; box-shadow: 0 0 10px rgba(240,96,96,0.5); }

  .footer {
    font-size: 0.75em;
    color: #f9fafb;
    letter-spacing: 2px;
    text-align: center;
  }

  /* SCREENSAVER */
  #screensaver {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 500;
    transition: background-color 1.2s ease;
  }

  #screensaver.spotify-active {
    background-color: #111827;
  }

  #ss-vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.55) 100%);
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  #screensaver.spotify-active #ss-vignette {
    opacity: 1;
  }

  #ss-logo {
    position: absolute;
    width: 160px;
    height: 160px;
    object-fit: contain;
    filter: drop-shadow(0 0 20px rgba(217,119,87,0.7));
    transition: filter 0.2s ease;
  }

  #ss-logo.alert {
    filter: drop-shadow(0 0 14px rgba(255,60,60,1)) drop-shadow(0 0 32px rgba(255,60,60,0.7));
  }

  #ss-nowplaying {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    flex-direction: row;
    align-items: center;
    gap: 50px;
  }

  #ss-np-art {
    width: 340px;
    height: 340px;
    object-fit: cover;
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(255,255,255,0.15);
    flex-shrink: 0;
  }

  #ss-np-info {
    display: flex;
    flex-direction: column;
    gap: 22px;
    width: 460px;
    flex-shrink: 0;
    text-align: left;
  }

  .ss-np-marquee {
    overflow: hidden;
    width: 100%;
  }

  #ss-np-track {
    font-size: 2.8em;
    font-weight: 800;
    color: #f9fafb;
    letter-spacing: 0.5px;
    display: inline-block;
    white-space: nowrap;
    will-change: transform;
  }

  #ss-np-album {
    font-size: 1.5em;
    color: #d1d5db;
    letter-spacing: 0.5px;
    display: inline-block;
    white-space: nowrap;
    will-change: transform;
  }

  #ss-np-bottom {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 6px;
  }

  #ss-np-artist {
    font-size: 1.3em;
    color: #9ca3af;
    letter-spacing: 0.5px;
    display: inline-block;
    white-space: nowrap;
    will-change: transform;
  }

  #ss-np-progress-track {
    width: 100%;
    height: 8px;
    background: #1f2937;
    border-radius: 4px;
    overflow: hidden;
  }

  #ss-np-progress-fill {
    height: 100%;
    width: 0%;
    background: #ffffff;
    border-radius: 4px;
    transition: width 0.9s linear;
  }

  #ss-np-time {
    display: flex;
    justify-content: space-between;
    font-size: 0.9em;
    color: #6b7280;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="screensaver">
  <div id="ss-vignette"></div>
  <img id="ss-logo" src="" alt="Claude">
  <div id="ss-nowplaying">
    <img id="ss-np-art" src="" alt="Album art">
    <div id="ss-np-info">
      <div class="ss-np-marquee"><div id="ss-np-track"></div></div>
      <div class="ss-np-marquee"><div id="ss-np-album"></div></div>
      <div id="ss-np-bottom">
        <div class="ss-np-marquee"><div id="ss-np-artist"></div></div>
        <div id="ss-np-progress-track"><div id="ss-np-progress-fill"></div></div>
        <div id="ss-np-time"><span id="ss-np-elapsed">0:00</span><span id="ss-np-duration">0:00</span></div>
      </div>
    </div>
  </div>
</div>

<!-- LEFT -->
<div class="left">
  <!-- Weather -->
  <div class="weather-widget">
    <div class="weather-icon" id="w-icon">🌡️</div>
    <div class="weather-temp" id="w-temp">--°C</div>
    <div class="weather-lowhigh" id="w-lowhigh">-- / --</div>
    <div class="weather-desc" id="w-desc">Loading...</div>
    <div class="weather-loc" id="w-loc">Detecting...</div>
  </div>

  <!-- Center: logo + status -->
  <div class="left-center">
    <img id="logo" class="logo-img" src="https://cdn.stickermule.com/artworks/1c69d7fd-a6de-42a8-99be-3edc7b32c8f1/large.png?cacheFor=31a4293c9f5cc540655eb3642dd66c15" alt="Claude">
    <div class="mascot-label">Claude</div>
    <div class="live" id="live-status"><div class="live-dot"></div><span id="live-label">SYNCING</span></div>
    <div id="reset-soon">Resetting soon</div>
  </div>

  <!-- Pi stats -->
  <div class="pi-stats">
    <div class="pi-stat">
      <div class="pi-stat-val" id="pi-cpu">--%</div>
      <div class="pi-stat-lbl">CPU</div>
    </div>
    <div class="pi-stat">
      <div class="pi-stat-val" id="pi-ram">--%</div>
      <div class="pi-stat-lbl">RAM</div>
    </div>
    <div class="pi-stat">
      <div class="pi-stat-val" id="pi-temp">--°C</div>
      <div class="pi-stat-lbl">TEMP</div>
    </div>
  </div>
</div>

<!-- RIGHT -->
<div class="right">
  <div class="top-bar">
    <div class="top-title">Usage Monitor</div>
    <div class="top-time" id="clock">--</div>
  </div>

  <div class="card">
    <div class="card-top">
      <div>
        <div class="card-label">Session Usage · 5h window</div>
        <div class="card-pct" id="session-val">--</div>
      </div>
      <div class="countdown-box">
        <div class="countdown" id="session-cd">--</div>
        <div class="countdown-label">until reset</div>
      </div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="session-bar"></div></div>
  </div>

  <div class="card">
    <div class="card-top">
      <div>
        <div class="card-label">Weekly Usage · 7d window</div>
        <div class="card-pct" id="weekly-val">--</div>
      </div>
      <div class="countdown-box">
        <div class="countdown" id="weekly-cd">--</div>
        <div class="countdown-label">until reset</div>
      </div>
    </div>
    <div class="bar-track"><div class="bar-fill" id="weekly-bar"></div></div>
  </div>

  <div class="footer" id="last-update">Waiting for data...</div>
</div>

<script>
  // ── Weather ──────────────────────────────────────────────
  const WMO_ICONS = {
    0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️',
    45:'🌫️', 48:'🌫️',
    51:'🌦️', 53:'🌦️', 55:'🌧️',
    61:'🌧️', 63:'🌧️', 65:'🌧️',
    71:'🌨️', 73:'🌨️', 75:'🌨️', 77:'🌨️',
    80:'🌦️', 81:'🌧️', 82:'🌧️',
    85:'🌨️', 86:'🌨️',
    95:'⛈️', 96:'⛈️', 99:'⛈️'
  };
  const WMO_DESC = {
    0:'Clear sky', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast',
    45:'Fog', 48:'Icy fog',
    51:'Light drizzle', 53:'Drizzle', 55:'Heavy drizzle',
    61:'Light rain', 63:'Rain', 65:'Heavy rain',
    71:'Light snow', 73:'Snow', 75:'Heavy snow', 77:'Snow grains',
    80:'Rain showers', 81:'Showers', 82:'Heavy showers',
    85:'Snow showers', 86:'Heavy snow showers',
    95:'Thunderstorm', 96:'Thunderstorm + hail', 99:'Heavy thunderstorm'
  };

  let geoCache = null;

  async function fetchLocation() {
    try {
      const res = await fetch('https://ipapi.co/json/');
      const d = await res.json();
      geoCache = { lat: d.latitude, lon: d.longitude, label: d.city + ', ' + d.region_code };
    } catch(e) {
      geoCache = { lat: 44.9537, lon: -93.0900, label: 'Saint Paul, MN' };
    }
    document.getElementById('w-loc').textContent = geoCache.label;
  }

  async function updateWeather() {
    if (!geoCache) await fetchLocation();
    try {
      const { lat, lon } = geoCache;
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&daily=temperature_2m_min,temperature_2m_max&temperature_unit=celsius&timezone=auto`);
      const data = await res.json();
      const temp = Math.round(data.current.temperature_2m);
      const code = data.current.weather_code;
      const lo   = Math.round(data.daily.temperature_2m_min[0]);
      const hi   = Math.round(data.daily.temperature_2m_max[0]);
      document.getElementById('w-icon').textContent = WMO_ICONS[code] || '🌡️';
      document.getElementById('w-temp').textContent = temp + '°C';
      document.getElementById('w-lowhigh').textContent = lo + '° / ' + hi + '°';
      document.getElementById('w-desc').textContent = WMO_DESC[code] || 'Unknown';
    } catch(e) {
      document.getElementById('w-desc').textContent = 'Unavailable';
    }
  }
  updateWeather();
  setInterval(updateWeather, 10 * 60 * 1000);
  setInterval(fetchLocation, 6 * 60 * 60 * 1000);
  // ─────────────────────────────────────────────────────────

  // 12h clock with seconds
  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
  }
  updateClock();
  setInterval(updateClock, 1000);

  const IMG_NORMAL    = 'https://cdn.stickermule.com/artworks/1c69d7fd-a6de-42a8-99be-3edc7b32c8f1/large.png?cacheFor=31a4293c9f5cc540655eb3642dd66c15';
  const IMG_ALERT     = 'https://storage.googleapis.com/sm-artworks/be75b541-e429-4b61-a058-6a04bc35f712/proof_retina_3x.png?cacheFor=ffd712cab85177f32f96b3056e9b2d5c';
  const IMG_CELEBRATE = 'https://cdn.stickermule.com/artworks/d3c8ea82-59f0-4606-97fa-88acd0bf21a0/large.png?cacheFor=8db00d69ee7e53baa5a50b27b9c50bba';
  const IMG_SPOTIFY   = 'assets/claude-spotify.png';

  // Preload all images
  [IMG_NORMAL, IMG_ALERT, IMG_CELEBRATE, IMG_SPOTIFY].forEach(src => { const i = new Image(); i.src = src; });

  let lastIsAlert = false;
  let celebrationActive = false;
  let mainSpotifyPlaying = false;

  function renderLogo() {
    const el = document.getElementById('logo');
    const targetSrc = mainSpotifyPlaying ? IMG_SPOTIFY : (lastIsAlert ? IMG_ALERT : IMG_NORMAL);
    if (el.src !== targetSrc) el.src = targetSrc;
    el.classList.toggle('alert', lastIsAlert && !mainSpotifyPlaying);
  }

  function updateLogo(isAlert) {
    lastIsAlert = isAlert;
    if (celebrationActive) return;
    renderLogo();
  }

  function updateMainSpotify(playing) {
    mainSpotifyPlaying = playing;
    if (celebrationActive) return;
    renderLogo();
  }

  function startCelebration() {
    celebrationActive = true;
    const el = document.getElementById('logo');
    el.src = IMG_CELEBRATE;
    el.className = 'logo-img';
    document.getElementById('reset-soon').style.opacity = '1';
  }

  function endCelebration() {
    celebrationActive = false;
    document.getElementById('reset-soon').style.opacity = '0';
    renderLogo();
  }

  // ── Screensaver ──────────────────────────────────────────
  const SS_W = 1024, SS_H = 600, SS_SIZE = 160;
  const STALE_MS = 150000; // no usage change for this long before screensaver triggers

  let ssActive = false, ssRaf = null;
  let ssX = 0, ssY = 0, ssDx = 2, ssDy = 1.6;
  let staleSince = null, prevSession = null, prevWeekly = null;
  let ssRevertTimer = null;
  let spotifyActive = false;
  let spotifyProgressMs = 0, spotifyDurationMs = 0, spotifyFetchTime = 0;

  function formatTime(ms) {
    const totalSec = Math.max(0, Math.floor(ms / 1000));
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return `${m}:${String(s).padStart(2, '0')}`;
  }

  // ── Album art color extraction ────────────────────────────
  const colorCanvas = document.createElement('canvas');
  colorCanvas.width = 24;
  colorCanvas.height = 24;
  const colorCtx = colorCanvas.getContext('2d', { willReadFrequently: true });
  let lastColorArtUrl = null;

  function rgbToHsl(r, g, b) {
    r /= 255; g /= 255; b /= 255;
    const max = Math.max(r, g, b), min = Math.min(r, g, b);
    let h = 0, s = 0;
    const l = (max + min) / 2;
    const d = max - min;
    if (d !== 0) {
      s = d / (1 - Math.abs(2 * l - 1));
      switch (max) {
        case r: h = ((g - b) / d) % 6; break;
        case g: h = (b - r) / d + 2; break;
        case b: h = (r - g) / d + 4; break;
      }
      h *= 60;
      if (h < 0) h += 360;
    }
    return [h, s, l];
  }

  function hslToRgb(h, s, l) {
    const c = (1 - Math.abs(2 * l - 1)) * s;
    const x = c * (1 - Math.abs((h / 60) % 2 - 1));
    const m = l - c / 2;
    let r = 0, g = 0, b = 0;
    if (h < 60)       { r = c; g = x; b = 0; }
    else if (h < 120) { r = x; g = c; b = 0; }
    else if (h < 180) { r = 0; g = c; b = x; }
    else if (h < 240) { r = 0; g = x; b = c; }
    else if (h < 300) { r = x; g = 0; b = c; }
    else              { r = c; g = 0; b = x; }
    return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
  }

  function extractColorAndApply(artUrl) {
    if (!artUrl || artUrl === lastColorArtUrl) return;
    lastColorArtUrl = artUrl;
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        colorCtx.drawImage(img, 0, 0, colorCanvas.width, colorCanvas.height);
        const data = colorCtx.getImageData(0, 0, colorCanvas.width, colorCanvas.height).data;
        let r = 0, g = 0, b = 0, count = 0;
        for (let i = 0; i < data.length; i += 4) {
          r += data[i]; g += data[i + 1]; b += data[i + 2];
          count++;
        }
        r = r / count; g = g / count; b = b / count;
        const [h, s, l] = rgbToHsl(r, g, b);
        const [dr, dg, db] = hslToRgb(h, Math.min(s, 0.55), Math.min(l, 0.22));
        document.getElementById('screensaver').style.backgroundColor = `rgb(${dr}, ${dg}, ${db})`;
      } catch (e) {
        // CORS/decode failure — keep the default background
      }
    };
    img.src = artUrl;
  }
  // ─────────────────────────────────────────────────────────

  // ── Marquee scroll for overflowing track/album text ──────
  let lastMarqueeTrack = null, lastMarqueeAlbum = null, lastMarqueeArtist = null;

  function setupMarquee(el, text) {
    if (el._marqueeAnim) { el._marqueeAnim.cancel(); el._marqueeAnim = null; }
    el.style.transform = 'translateX(0)';
    el.textContent = text;
    const container = el.parentElement;
    const overflow = el.scrollWidth - container.clientWidth;
    if (overflow > 4) {
      const speed = 35; // px/sec
      const pauseMs = 1200;
      const scrollMs = (overflow / speed) * 1000;
      const totalMs = scrollMs + pauseMs * 2;
      const pauseFrac = pauseMs / totalMs;
      el._marqueeAnim = el.animate([
        { transform: 'translateX(0)', offset: 0 },
        { transform: 'translateX(0)', offset: pauseFrac },
        { transform: `translateX(-${overflow}px)`, offset: 1 - pauseFrac },
        { transform: `translateX(-${overflow}px)`, offset: 1 }
      ], {
        duration: totalMs,
        iterations: Infinity,
        direction: 'alternate',
        easing: 'linear'
      });
    }
  }
  // ─────────────────────────────────────────────────────────

  function updateNowPlaying(playing, track, album, artist, art, progressMs, durationMs, isPodcast) {
    spotifyActive = playing;
    const npEl = document.getElementById('ss-nowplaying');
    const logoEl = document.getElementById('ss-logo');
    const ssEl = document.getElementById('screensaver');
    ssEl.classList.toggle('spotify-active', playing);
    if (playing) {
      if (track !== lastMarqueeTrack) {
        lastMarqueeTrack = track;
        setupMarquee(document.getElementById('ss-np-track'), track || '');
      }
      // Podcasts have no artist, so the middle album line is dropped and
      // the show name (album) takes its place in the bottom slot instead.
      const albumLineEl = document.getElementById('ss-np-album').parentElement;
      albumLineEl.style.display = isPodcast ? 'none' : '';
      if (!isPodcast && album !== lastMarqueeAlbum) {
        lastMarqueeAlbum = album;
        setupMarquee(document.getElementById('ss-np-album'), album || '');
      }
      const bottomText = isPodcast ? album : artist;
      if (bottomText !== lastMarqueeArtist) {
        lastMarqueeArtist = bottomText;
        setupMarquee(document.getElementById('ss-np-artist'), bottomText || '');
      }
      const artEl = document.getElementById('ss-np-art');
      if (art && artEl.src !== art) artEl.src = art;
      if (art) extractColorAndApply(art);
      spotifyProgressMs = progressMs || 0;
      spotifyDurationMs = durationMs || 0;
      spotifyFetchTime = Date.now();
      npEl.style.display = 'flex';
      logoEl.style.display = 'none';
    } else {
      npEl.style.display = 'none';
      logoEl.style.display = 'block';
      lastColorArtUrl = null;
      ssEl.style.backgroundColor = '';
      lastMarqueeTrack = null;
      lastMarqueeAlbum = null;
      lastMarqueeArtist = null;
    }
  }

  function ssFlashEdge() {
    const img = document.getElementById('ss-logo');
    if (ssRevertTimer) {
      clearTimeout(ssRevertTimer);
    } else {
      img.src = IMG_ALERT;
      img.className = 'alert';
    }
    ssRevertTimer = setTimeout(() => {
      img.src = IMG_NORMAL;
      img.className = '';
      ssRevertTimer = null;
    }, 1000);
  }

  function ssLoop() {
    ssX += ssDx;
    ssY += ssDy;
    let hit = false;
    if (ssX <= 0)              { ssX = 0;               ssDx =  Math.abs(ssDx); hit = true; }
    if (ssX >= SS_W - SS_SIZE) { ssX = SS_W - SS_SIZE;  ssDx = -Math.abs(ssDx); hit = true; }
    if (ssY <= 0)              { ssY = 0;               ssDy =  Math.abs(ssDy); hit = true; }
    if (ssY >= SS_H - SS_SIZE) { ssY = SS_H - SS_SIZE;  ssDy = -Math.abs(ssDy); hit = true; }
    if (hit) ssFlashEdge();
    const img = document.getElementById('ss-logo');
    img.style.left = ssX + 'px';
    img.style.top  = ssY + 'px';
    ssRaf = requestAnimationFrame(ssLoop);
  }

  function startScreensaver(isAlert) {
    ssActive = true;
    ssX = Math.random() * (SS_W - SS_SIZE);
    ssY = Math.random() * (SS_H - SS_SIZE);
    ssDx = (Math.random() > 0.5 ? 1 : -1) * (0.7 + Math.random() * 0.4);
    ssDy = (Math.random() > 0.5 ? 1 : -1) * (0.7 + Math.random() * 0.4);
    const img = document.getElementById('ss-logo');
    img.src = IMG_NORMAL;
    img.className = '';
    document.getElementById('screensaver').style.display = 'block';
    ssRaf = requestAnimationFrame(ssLoop);
    // Force marquee re-measurement now that the container is actually visible
    // (measuring while display:none always reads 0 width and would otherwise
    // permanently skip the animation for a track that was already playing).
    lastMarqueeTrack = null;
    lastMarqueeAlbum = null;
    lastMarqueeArtist = null;
  }

  function stopScreensaver() {
    ssActive = false;
    document.getElementById('screensaver').style.display = 'none';
    if (ssRaf) { cancelAnimationFrame(ssRaf); ssRaf = null; }
    if (ssRevertTimer) { clearTimeout(ssRevertTimer); ssRevertTimer = null; }
  }

  function checkStale(session, weekly) {
    const isAlert = session >= 80 || weekly >= 80;
    const now = Date.now();
    if (prevSession === null) {
      // first load — just record, don't count
    } else if (session === prevSession && weekly === prevWeekly) {
      if (staleSince === null) staleSince = now;
      if (now - staleSince >= STALE_MS && !ssActive) startScreensaver(isAlert);
    } else {
      staleSince = null;
      if (ssActive) stopScreensaver();
    }
    prevSession = session;
    prevWeekly  = weekly;
  }
  // ─────────────────────────────────────────────────────────

  // Countdown with seconds
  let sessionSecs = 0, weeklySecs = 0, lastFetch = 0;

  function formatCountdown(total) {
    if (total <= 0) return 'NOW';
    const h = Math.floor(total / 3600);
    const m = Math.floor((total % 3600) / 60);
    const s = total % 60;
    if (h >= 24) {
      const d = Math.floor(h / 24);
      const rh = h % 24;
      return `${d}d ${rh}h ${String(m).padStart(2,'0')}m`;
    }
    return `${h}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`;
  }

  setInterval(() => {
    const elapsed = Math.floor((Date.now() - lastFetch) / 1000);
    const sessionLeft = Math.max(0, sessionSecs - elapsed);
    const weeklyLeft  = Math.max(0, weeklySecs  - elapsed);
    document.getElementById('session-cd').textContent = formatCountdown(sessionLeft);
    document.getElementById('weekly-cd').textContent  = formatCountdown(weeklyLeft);

    const shouldCelebrate = sessionSecs > 0 && sessionLeft > 0 && sessionLeft < 300;
    if (shouldCelebrate && !celebrationActive) startCelebration();
    if (!shouldCelebrate && celebrationActive) endCelebration();

    if (spotifyActive && spotifyDurationMs > 0) {
      const elapsedMs = Math.min(spotifyDurationMs, spotifyProgressMs + (Date.now() - spotifyFetchTime));
      document.getElementById('ss-np-progress-fill').style.width = (elapsedMs / spotifyDurationMs * 100) + '%';
      document.getElementById('ss-np-elapsed').textContent = formatTime(elapsedMs);
      document.getElementById('ss-np-duration').textContent = formatTime(spotifyDurationMs);
    }
  }, 1000);

  function setLevel(valEl, barEl, pct) {
    const cls = pct >= 90 ? 'danger' : pct >= 70 ? 'warn' : '';
    valEl.className = 'card-pct' + (cls ? ' ' + cls : '');
    barEl.className = 'bar-fill' + (cls ? ' ' + cls : '');
  }

  async function update() {
    try {
      const res = await fetch('/usage.json?t=' + Date.now());
      const d   = await res.json();

      sessionSecs = d.session_reset_mins * 60;
      weeklySecs  = d.weekly_reset_mins  * 60;
      lastFetch   = Date.now();

      const sv = document.getElementById('session-val');
      const sb = document.getElementById('session-bar');
      const wv = document.getElementById('weekly-val');
      const wb = document.getElementById('weekly-bar');

      sv.textContent = Math.ceil(d.session) + '%';
      wv.textContent = Math.ceil(d.weekly)  + '%';
      sb.style.width = Math.min(d.session, 100) + '%';
      wb.style.width = Math.min(d.weekly,  100) + '%';

      setLevel(sv, sb, d.session);
      setLevel(wv, wb, d.weekly);

      updateLogo(d.session >= 80 || d.weekly >= 80);
      updateMainSpotify(!!d.spotify_playing);
      checkStale(d.session, d.weekly);
      updateNowPlaying(!!d.spotify_playing, d.spotify_track, d.spotify_album, d.spotify_artist, d.spotify_album_art,
        d.spotify_progress_ms, d.spotify_duration_ms, !!d.spotify_is_podcast);

      if (d.cpu !== undefined && d.cpu !== null) {
        document.getElementById('pi-cpu').textContent = d.cpu + '%';
        document.getElementById('pi-ram').textContent = d.ram + '%';
        document.getElementById('pi-temp').textContent = d.temp !== null ? d.temp + '°C' : '--°C';
      }

      document.getElementById('last-update').textContent =
        'Synced ' + new Date().toLocaleTimeString('en-US', { hour12: true }) + ' · refreshes every 15s';
      const ls = document.getElementById('live-status');
      ls.className = 'live';
      document.getElementById('live-label').textContent = 'LIVE';
    } catch(e) {
      document.getElementById('last-update').textContent = 'Connection error — retrying...';
      const ls = document.getElementById('live-status');
      ls.className = 'live error';
      document.getElementById('live-label').textContent = 'ERROR';
    }
  }

  update();
  setInterval(update, 1000);

  // Reload only if the file has actually changed on disk (picks up GitHub auto-pulls)
  let pageVersion = null;
  async function checkForUpdate() {
    try {
      const res = await fetch('/dashboard.html', { method: 'HEAD', cache: 'no-store' });
      const ver = res.headers.get('last-modified') || res.headers.get('etag');
      if (pageVersion === null) { pageVersion = ver; return; }
      if (ver && ver !== pageVersion) location.reload();
    } catch(e) {}
  }
  setInterval(checkForUpdate, 5 * 60 * 1000);
</script>
</body>
